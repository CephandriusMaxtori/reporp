name: Build Minecraft Resource Pack

on:
  push:
    branches: [ "main" ]
  # This adds the "button" to the Actions tab
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type (e.g. Release, Alpha, Beta)'
        required: true
        default: 'Release'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Resource Pack
      # You can even use the input from the button in your build!
      run: ./gradlew build -PbuildType=${{ github.event.inputs.build_type }}

    - name: Upload Pack Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ResourcePack-${{ github.event.inputs.build_type || 'Manual-Build' }}
        path: build/distributions/*.zip
