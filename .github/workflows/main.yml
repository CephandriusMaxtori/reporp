name: Build and Release Resource Pack

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # The manual button

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Important: Allows the action to create a Release

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant Execute Permission
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew build

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        # This tag name will update every time you push
        tag_name: latest
        name: Latest Resource Pack Build
        body: |
          Automated build of the resource pack.
          Generated from commit: ${{ github.sha }}
        draft: false
        prerelease: false
        # Adjust this path to match where your Gradle zip actually ends up
        files: build/distributions/*.zip
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
