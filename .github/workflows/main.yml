name: Build Minecraft Resource Pack

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Grant Execute Permission for Gradlew
      run: chmod +x gradlew

    - name: Build Resource Pack with Gradle
      run: ./gradlew build

    - name: Upload Pack Artifact
      uses: actions/upload-artifact@v4
      with:
        name: ResourcePack-Build
        # This path depends on your build.gradle settings. 
        # Usually, Gradle puts outputs in build/libs/ or build/distributions/
        path: build/distributions/*.zip
